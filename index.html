<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Contracts">
<meta name="theme-color" content="#0b0b0f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<title>Contracts</title>
<style>
:root{
  --bg1:#eef1f7; --bg2:#e3e7f0; --ink:#1c1c1e; --ink2:#3a3a3c; --sec:#8a8a8e;
  --glass:rgba(255,255,255,.72); --glass-brd:rgba(255,255,255,.6);
  --card:rgba(255,255,255,.78); --hair:rgba(60,60,67,.13);
  --pill:rgba(118,118,128,.12); --blue:#0A84FF; --shadow:0 10px 30px rgba(31,38,72,.12);
  --red:#FF453A; --orange:#FF9F0A; --yellow:#E6A700; --green:#30B0C7; --grey:#8a8a8e;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg1:#0b0b0f; --bg2:#16161c; --ink:#f5f5f7; --ink2:#d8d8de; --sec:#9a9aa2;
    --glass:rgba(30,30,38,.66); --glass-brd:rgba(255,255,255,.10);
    --card:rgba(28,28,36,.72); --hair:rgba(255,255,255,.10);
    --pill:rgba(120,120,130,.24); --shadow:0 12px 34px rgba(0,0,0,.5);
    --yellow:#FFD60A; --green:#30D158;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 80% -10%, rgba(10,132,255,.18), transparent 60%),
    radial-gradient(120% 80% at -10% 10%, rgba(175,82,222,.16), transparent 55%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment:fixed;min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;
}
.app{width:100%;max-width:440px;padding:max(14px,env(safe-area-inset-top)) 16px calc(110px + env(safe-area-inset-bottom));position:relative}
.h-top{display:flex;justify-content:space-between;align-items:flex-end;margin:8px 4px 14px}
.h-top .lt{font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1}
.h-top .dt{font-size:13px;color:var(--sec);margin-top:5px;font-weight:500}
.gear{width:38px;height:38px;border-radius:50%;background:var(--pill);border:0;color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.gear svg{width:20px;height:20px}
.glass{background:var(--glass);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border:1px solid var(--glass-brd);border-radius:26px;box-shadow:var(--shadow)}
.sec-h{font-size:13px;font-weight:700;color:var(--sec);margin:22px 8px 8px;display:flex;justify-content:space-between;align-items:center}
.sec-h .ct{font-weight:600;color:var(--sec);font-size:12px}
.hero{padding:18px 18px 14px;margin-top:4px}
.hero .lead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hero .lead .ttl{font-size:20px;font-weight:800;letter-spacing:-.01em}
.ring{font-size:12px;font-weight:700;color:var(--blue);background:rgba(10,132,255,.12);padding:5px 11px;border-radius:20px}
.kpis{display:flex;gap:8px}
.kpi{flex:1;text-align:center;background:var(--pill);border-radius:16px;padding:11px 4px;cursor:pointer}
.kpi .n{font-size:23px;font-weight:800;line-height:1}
.kpi .l{font-size:10px;color:var(--sec);margin-top:5px;font-weight:600;letter-spacing:.02em}
.kpi.k-red .n{color:var(--red)} .kpi.k-org .n{color:var(--orange)} .kpi.k-yel .n{color:var(--yellow)} .kpi.k-blu .n{color:var(--blue)}
.list{padding:4px 16px}
.list .grp{font-size:11.5px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 2px}
.list .grp:first-child{margin-top:8px}
.row{display:flex;align-items:center;gap:13px;padding:12px 0;border-top:1px solid var(--hair);cursor:pointer}
.row:first-of-type{border-top:0}
.ic{width:46px;height:46px;border-radius:13px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.18);line-height:1}
.ic .dnum{font-weight:800;font-size:16px;letter-spacing:-.02em}
.ic .dlab{font-weight:700;font-size:8.5px;opacity:.95;margin-top:2px;text-transform:uppercase;letter-spacing:.03em}
.row .meta{flex:1;min-width:0}
.row .nm{font-size:16px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .sub{font-size:12.5px;color:var(--sec);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .val{font-size:14px;color:var(--ink2);font-weight:700;white-space:nowrap;text-align:right}
.row .val .vsub{display:block;font-size:10.5px;color:var(--sec);font-weight:600;margin-top:2px}
.detail{display:none;padding:2px 0 12px 59px;font-size:13px;border-top:1px solid var(--hair)}
.row.open + .detail{display:block}
.detail .k{color:var(--sec);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;margin:11px 0 3px;font-weight:700}
.detail .desc{color:var(--ink2);line-height:1.4}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{font-size:10.5px;padding:3px 9px;border-radius:8px;background:var(--pill);color:var(--ink2);font-weight:600}
.chip.lc{color:var(--blue);background:rgba(10,132,255,.13)}
.codes code{display:inline-block;background:var(--pill);border-radius:6px;padding:2px 8px;margin:3px 5px 0 0;font-size:11.5px;color:var(--ink2);font-family:ui-monospace,Menlo,monospace}
.search{width:100%;margin:6px 0 2px;padding:13px 15px;border-radius:15px;border:1px solid var(--hair);background:var(--card);color:var(--ink);font-size:15px;font-family:inherit}
.search::placeholder{color:var(--sec)}
.metaline{font-size:12px;color:var(--sec);margin:10px 8px 0}
.tabs{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:408px;display:flex;justify-content:space-around;padding:10px 8px;border-radius:26px;z-index:20}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--sec);border:0;background:transparent;cursor:pointer;font-family:inherit;flex:1}
.tab.on{color:var(--blue)}.tab svg{width:23px;height:23px}
.foot{font-size:10.5px;color:var(--sec);text-align:center;margin:18px 8px 0;line-height:1.5}
.banner{margin:10px 4px 0;padding:11px 14px;border-radius:16px;font-size:12.5px;font-weight:500;display:none}
.banner.show{display:block}
.banner.err{background:rgba(255,69,58,.14);color:#FF453A}
.banner.ok{background:rgba(48,199,89,.14);color:#34C759}
.empty{text-align:center;color:var(--sec);padding:26px 10px;font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.overlay.show{display:flex}
.sheet{width:100%;max-width:400px;padding:22px}
.sheet h2{margin:0 0 4px;font-size:20px;font-weight:800}
.sheet p{margin:0 0 16px;font-size:13px;color:var(--sec);line-height:1.5}
.sheet label{font-size:12px;font-weight:700;color:var(--sec);display:block;margin:12px 0 5px}
.sheet input{width:100%;padding:12px 14px;border-radius:13px;border:1px solid var(--hair);background:var(--card);color:var(--ink);font-size:15px;font-family:inherit}
.sheet .btns{display:flex;gap:10px;margin-top:18px}
.sheet button{flex:1;padding:13px;border-radius:14px;border:0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.sheet .save{background:var(--blue);color:#fff}
.sheet .cancel{background:var(--pill);color:var(--ink)}
</style>
</head>
<body>
<div class="app">
  <div class="h-top">
    <div><div class="lt">Contracts</div><div class="dt" id="subhead"></div></div>
    <button class="gear" id="gear" aria-label="Setup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 2.6h.1A1.6 1.6 0 0 0 11 1a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 17 2.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0 1.1 2.7h.2a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.4 1.1z"/></svg></button>
  </div>

  <div class="banner" id="banner"></div>

  <div class="view" id="v-renew">
    <div class="glass hero">
      <div class="lead"><div class="ttl">Action Needed</div><div class="ring" id="ring">–</div></div>
      <div class="kpis">
        <div class="kpi k-red" data-f="exp"><div class="n" id="k-exp">0</div><div class="l">EXPIRED</div></div>
        <div class="kpi k-org" data-f="d30"><div class="n" id="k-30">0</div><div class="l">≤30 DAYS</div></div>
        <div class="kpi k-yel" data-f="d90"><div class="n" id="k-90">0</div><div class="l">≤90 DAYS</div></div>
        <div class="kpi k-blu" data-f="all"><div class="n" id="k-all">0</div><div class="l">ACTIVE</div></div>
      </div>
    </div>
    <div class="sec-h"><span id="urgh">Up next</span></div>
    <div class="glass list" id="urgent"></div>
  </div>

  <div class="view" id="v-all" hidden>
    <input class="search" id="search" placeholder="Search supplier, type, contract #…" autocomplete="off">
    <div class="metaline" id="metaline"></div>
    <div class="glass list" id="alllist"></div>
  </div>

  <div class="view" id="v-other" hidden>
    <div class="sec-h"><span>⏳ Perpetual / no fixed end</span><span class="ct" id="perp-ct"></span></div>
    <div class="glass list" id="perp"></div>
    <div class="sec-h"><span>🔒 NDAs</span><span class="ct" id="nda-ct"></span></div>
    <div class="glass list" id="nda"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<nav class="glass tabs">
  <button class="tab on" data-v="v-renew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>Renewals</button>
  <button class="tab" data-v="v-all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>All</button>
  <button class="tab" data-v="v-other"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 9h6v6H9z"/></svg>Other</button>
</nav>

<div class="overlay" id="overlay">
  <div class="glass sheet">
    <h2>Setup</h2>
    <p>Your contract data loads automatically from your private gist. A token is optional — only add one for authenticated requests. Everything stays on this device.</p>
    <label>Gist ID</label><input id="in-gist" type="text" placeholder="e.g. a1b2c3d4…" autocomplete="off">
    <label>GitHub token (optional)</label><input id="in-token" type="password" placeholder="leave blank if unsure" autocomplete="off">
    <div class="btns"><button class="cancel" id="cancel">Cancel</button><button class="save" id="save">Save &amp; Sync</button></div>
  </div>
</div>

<script>
const EMBED = null;
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const LS={get(k,d){try{return localStorage.getItem(k)??d}catch(e){return d}},
          set(k,v){try{localStorage.setItem(k,v)}catch(e){}}};
const _now=new Date(); const _t0=new Date(_now.getFullYear(),_now.getMonth(),_now.getDate());
document.getElementById("subhead").textContent="";

function banner(msg,cls){const b=document.getElementById("banner");b.textContent=msg;b.className="banner show "+cls;
  if(cls==="ok")setTimeout(()=>b.className="banner",2500);}

function daysTo(end){const d=new Date(end+"T00:00:00");return Math.round((d-_t0)/86400000);}
function fmtDate(s){const [y,m,d]=s.split("-");return MON[+m-1]+" "+(+d)+", "+y;}
function fmtMoney(n){return n>0?"$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0}):"—";}
function daysLabel(d){if(d<0)return Math.abs(d)+"d ago";if(d===0)return "today";if(d===1)return "tomorrow";return "in "+d+"d";}
function urgency(d){
  if(d<0) return {c:"var(--red)",lab:"EXP",k:"exp"};
  if(d<=30) return {c:"var(--orange)",lab:"DAYS",k:"d30"};
  if(d<=90) return {c:"var(--yellow)",lab:"DAYS",k:"d90"};
  if(d<=180) return {c:"var(--green)",lab:"DAYS",k:"d180"};
  if(d<=365) return {c:"var(--blue)",lab:"DAYS",k:"d365"};
  return {c:"var(--grey)",lab:"DAYS",k:"far"};
}

function rowHTML(x,idx,prefix){
  const d=(x.days!==undefined&&x.perp)?null:daysTo(x.end);
  const u=d===null?{c:"var(--grey)"}:urgency(d);
  const big=d===null?"∞":(d<0?Math.abs(d):d);
  const lab=d===null?"":(d<0?"AGO":"DAYS");
  const tags=(x.types||[]).map(t=>`<span class="chip">${t}</span>`).join("")
    +((x.lines>1)?`<span class="chip lc">${x.lines} lines merged</span>`:"");
  const owners=(x.biz_owners&&x.biz_owners.length)?x.biz_owners.join(", "):"—";
  const id=prefix+idx;
  return `<div class="row" data-id="${id}">
    <div class="ic" style="background:${u.c}"><span class="dnum">${big}</span><span class="dlab">${lab}</span></div>
    <div class="meta"><div class="nm">${x.supplier}</div>
      <div class="sub">${d===null?"no fixed end":daysLabel(d)} · ${fmtDate(x.end)} · ${x.dept||"—"}</div></div>
    <div class="val">${fmtMoney(x.spend)}</div>
  </div>
  <div class="detail" data-for="${id}">
    <div class="k">Description</div><div class="desc">${x.desc||"—"}</div>
    <div class="k">Business owner(s)</div><div class="desc">${owners}</div>
    <div class="k">Type</div><div class="chips">${tags||'<span class="chip">—</span>'}</div>
    <div class="k">Underlying contract #s (${(x.children||[]).length})</div>
    <div class="codes">${(x.children||[]).map(c=>`<code>${c}</code>`).join("")}</div>
  </div>`;
}

let DATA=null, filter="all", q="";

function counts(a){
  const D=a.map(x=>daysTo(x.end));
  return {exp:D.filter(d=>d<0).length, d30:D.filter(d=>d>=0&&d<=30).length,
          d90:D.filter(d=>d<=90).length, all:a.length};
}

function render(D){
  DATA=D;
  const active=(D.active||[]).slice().sort((a,b)=>daysTo(a.end)-daysTo(b.end));
  const perp=D.perpetual||[], nda=D.nda||[];
  D._active=active;
  document.getElementById("subhead").textContent=(D.owner||"")+" · as of "+(D.as_of?fmtDate(D.as_of):"—");
  const c=counts(active);
  document.getElementById("k-exp").textContent=c.exp;
  document.getElementById("k-30").textContent=c.d30;
  document.getElementById("k-90").textContent=c.d90;
  document.getElementById("k-all").textContent=c.all;
  document.getElementById("ring").textContent=c.d90+" need attention";

  // urgent list (expired + <=90)
  const urg=active.filter(x=>daysTo(x.end)<=90);
  document.getElementById("urgh").textContent=urg.length+" expiring within 90 days";
  document.getElementById("urgent").innerHTML=urg.length?urg.map((x,i)=>rowHTML(x,i,"u")).join(""):'<div class="empty">Nothing in the next 90 days 🎉</div>';

  renderAll();

  document.getElementById("perp").innerHTML=perp.length?perp.map((x,i)=>rowHTML({...x,perp:true},i,"p")).join(""):'<div class="empty">None</div>';
  document.getElementById("nda").innerHTML=nda.length?nda.map((x,i)=>rowHTML(x,i,"n")).join(""):'<div class="empty">None</div>';
  document.getElementById("perp-ct").textContent=perp.length;
  document.getElementById("nda-ct").textContent=nda.length;

  const total=(active.length+perp.length+nda.length);
  document.getElementById("foot").innerHTML=
    "Built "+(D.built||"—")+" · "+(D.source_lines||"?")+" report lines → "+total+" agreement families<br>"+
    "MSA + amendments sharing an end date are merged · data stays on this device";
  bindRows();
}

function renderAll(){
  const active=DATA._active||[];
  let rows=active.slice();
  if(filter==="exp")rows=rows.filter(x=>daysTo(x.end)<0);
  else if(filter==="d30")rows=rows.filter(x=>{const d=daysTo(x.end);return d>=0&&d<=30;});
  else if(filter==="d90")rows=rows.filter(x=>daysTo(x.end)<=90);
  if(q)rows=rows.filter(x=>((x.supplier||"")+" "+(x.types||[]).join(" ")+" "+(x.children||[]).join(" ")+" "+(x.desc||"")).toLowerCase().includes(q));
  document.getElementById("metaline").textContent=rows.length+" agreement"+(rows.length===1?"":"s")+" · "+fmtMoney(rows.reduce((s,x)=>s+(x.spend||0),0))+" tracked";
  document.getElementById("alllist").innerHTML=rows.length?rows.map((x,i)=>rowHTML(x,i,"a")).join(""):'<div class="empty">No matches.</div>';
  bindRows();
}

function bindRows(){
  document.querySelectorAll(".row[data-id]").forEach(r=>{
    r.onclick=()=>{r.classList.toggle("open");};
  });
}

/* kpi filters jump to All tab */
document.querySelectorAll(".kpi").forEach(k=>k.onclick=()=>{
  filter=k.dataset.f; switchTab("v-all"); renderAll();
  document.getElementById("search").value=""; q="";
});

/* tabs */
function switchTab(id){
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.v===id));
  document.querySelectorAll(".view").forEach(v=>{v.hidden=(v.id!==id);});
  window.scrollTo({top:0,behavior:"smooth"});
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchTab(t.dataset.v));
document.getElementById("search").addEventListener("input",e=>{q=e.target.value.trim().toLowerCase();renderAll();});

/* gist sync */
async function gistPull(){
  const token=LS.get("ct_token"),gist=LS.get("ct_gist");
  if(!gist){openSetup();return null;}
  const headers={Accept:"application/vnd.github+json"};
  if(token)headers.Authorization="Bearer "+token;
  const r=await fetch("https://api.github.com/gists/"+gist+"?t="+Date.now(),{headers,cache:"no-store"});
  if(!r.ok)throw new Error("GitHub "+r.status);
  const g=await r.json();const f=g.files&&g.files["contractdata.json"];
  if(!f)throw new Error("contractdata.json not in gist");
  const txt=f.truncated?await(await fetch(f.raw_url)).text():f.content;
  return JSON.parse(txt);
}
async function sync(){
  try{const d=await gistPull();if(d){LS.set("ct_data",JSON.stringify(d));render(d);banner("Updated "+(d.built||""),"ok");}}
  catch(e){banner("Sync failed: "+e.message+" — showing last saved","err");}
}

/* setup */
function openSetup(){document.getElementById("in-token").value=LS.get("ct_token","");document.getElementById("in-gist").value=LS.get("ct_gist","");document.getElementById("overlay").classList.add("show");}
document.getElementById("gear").onclick=openSetup;
document.getElementById("cancel").onclick=()=>document.getElementById("overlay").classList.remove("show");
document.getElementById("save").onclick=()=>{LS.set("ct_token",document.getElementById("in-token").value.trim());LS.set("ct_gist",document.getElementById("in-gist").value.trim());document.getElementById("overlay").classList.remove("show");sync();};

/* boot */
const hash=new URLSearchParams(location.hash.slice(1));
if(hash.get("g"))LS.set("ct_gist",hash.get("g"));
if(EMBED){ render(EMBED); }
else {
  const cached=LS.get("ct_data");
  if(cached){try{render(JSON.parse(cached));}catch(e){}}
  sync();
}
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
